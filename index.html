<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <!-- Android のステータスバー/ナビ領域の色。アプリ背景（暖色）に合わせ、OSのライト/ダークで出し分ける。
         アプリ内のテーマ切替（手動）時は main.tsx の applyTheme が JS でこの値を上書きする。 -->
    <meta name="theme-color" content="#f7f1e8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1815" media="(prefers-color-scheme: dark)" />
    <title>AB Operations</title>
    <!-- PWA: manifest リンクと SW 登録は vite-plugin-pwa が自動注入する -->
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="AB Operations" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
